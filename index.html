<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%227%22%20fill%3D%22%232563eb%22%2F%3E%3Cpath%20d%3D%22M9%2016.5l4%204%2010-10%22%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>待办清单</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#eff6ff 0%,#fff 100%);min-height:100vh;color:#1e3a8a;margin:0}.container{max-width:28rem;margin:0 auto;padding:2rem 1rem}header{text-align:center;margin-bottom:2rem}.icon{width:3.5rem;height:3.5rem;border-radius:1rem;background:#2563eb;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;box-shadow:0 10px 15px -3px rgba(37,99,235,.2)}.icon svg{width:1.75rem;height:1.75rem;stroke:#fff;stroke-width:2.5;fill:none}header h1{font-size:1.875rem;font-weight:700;color:#1e3a8a;margin-bottom:.25rem}header p{font-size:.875rem;color:#60a5fa}.add-form{display:flex;gap:.5rem;margin-bottom:1.25rem}.add-form input{flex:1;border:1px solid #bfdbfe;border-radius:.75rem;padding:.75rem 1rem;font-size:.875rem;background:#fff;outline:none}.add-form input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}.add-form button{border:none;border-radius:.75rem;padding:.75rem 1rem;font-size:.875rem;font-weight:500;background:#2563eb;color:#fff;cursor:pointer}.add-form button:active{transform:scale(.97)}.add-form button:disabled{background:#93c5fd;cursor:not-allowed}.stats{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:.75rem;padding:.75rem 1rem;margin-bottom:1rem;font-size:.875rem;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e0f2fe}.filters{display:inline-flex;gap:.25rem;background:#eff6ff;border-radius:.5rem;padding:.25rem}.filters button{border:none;border-radius:.375rem;padding:.25rem .75rem;font-size:.75rem;font-weight:500;cursor:pointer;background:transparent;color:#3b82f6}.filters button.active{background:#2563eb;color:#fff}.todo-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;padding:0}.todo-item{display:flex;align-items:center;gap:.75rem;background:#fff;border-radius:.75rem;padding:.75rem 1rem;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e0f2fe}.todo-item .check{width:1.5rem;height:1.5rem;border-radius:50%;border:2px solid #93c5fd;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#fff}.todo-item .check.checked{border-color:#2563eb;background:#2563eb}.todo-item .check svg{width:.875rem;height:.875rem;stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round}.todo-item .text{flex:1;font-size:.875rem;word-break:break-all;cursor:pointer}.todo-item .text.completed{color:#93c5fd;text-decoration:line-through}.todo-item .delete{width:2rem;height:2rem;border-radius:.5rem;border:none;background:transparent;color:#93c5fd;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.todo-item .delete:hover{background:#fef2f2;color:#ef4444}.todo-item .delete svg{width:1rem;height:1rem;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.empty{border:2px dashed #bfdbfe;border-radius:1rem;background:rgba(255,255,255,.6);padding:3rem 1rem;text-align:center}.empty-icon{width:3rem;height:3rem;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem}.empty-icon svg{width:1.5rem;height:1.5rem;stroke:#60a5fa;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.empty p{font-size:.875rem;color:#93c5fd}.clear-btn{margin-top:1.5rem;text-align:center}.clear-btn button{background:none;border:none;color:#60a5fa;font-size:.75rem;font-weight:500;cursor:pointer;text-decoration:underline;}footer{margin-top:3rem;text-align:center;font-size:.75rem;color:#93c5fd}</style></head><body><div id="root"></div><script>const STORAGE_KEY="todo-app-list",getSaved=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch(e){return[]}};function render(){let todos=getSaved(),input=document.querySelector(".add-form input"),filterBtn=document.querySelectorAll(".filters button"),list=document.querySelector(".todo-list"),remaining=document.querySelector(".stats b"),total=document.querySelector(".stats span"),clear=document.querySelector(".clear-btn button"),active=document.querySelector(".filters .active")?.dataset.filter||"all";input.value="",input.onkeydown=e=>{"Enter"===e.key&&(e.preventDefault(),add())},document.querySelector(".add-form button").onclick=add,filterBtn.forEach(e=>{e.onclick=()=>{filterBtn.forEach(t=>t.classList.remove("active")),e.classList.add("active"),active=e.dataset.filter,list.innerHTML="",renderList()}}),total.innerHTML="剩余 <b>"+todos.filter(e=>!e.completed).length+"</b> / "+todos.length,todos.some(e=>e.completed)?(clear.style.display="inline-block",clear.onclick=()=>{todos=todos.filter(e=>!e.completed),localStorage.setItem(STORAGE_KEY,JSON.stringify(todos)),render()}):clear.style.display="none";function add(){let value=input.value.trim();if(!value)return;todos=[{id:Date.now(),text:value,completed:!1},...todos],localStorage.setItem(STORAGE_KEY,JSON.stringify(todos)),render()}function toggle(id){todos=todos.map(e=>e.id===id?{...e,completed:!e.completed}:e),localStorage.setItem(STORAGE_KEY,JSON.stringify(todos)),render()}function del(id){todos=todos.filter(e=>e.id!==id),localStorage.setItem(STORAGE_KEY,JSON.stringify(todos)),render()}function renderList(){let visible=todos.filter(e=>"active"===active?!e.completed:"completed"===active?e.completed:!0);if(0===visible.length){let emp
